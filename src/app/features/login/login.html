<div class="login-page">
  <div class="login-glow"></div>

  <div class="login-card">
    <!-- Logo & Branding -->
    <div class="login-brand">
      <div class="brand-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h1 class="brand-name">Mutexa</h1>
      <p class="brand-subtitle">Mutasi & Expense Transaction Analyzer</p>
    </div>

    <!-- Form Login -->
    <div class="login-form-area">
      <h2 class="form-title">Selamat Datang</h2>
      <p class="form-desc">Masuk dengan akun yang telah diberikan oleh administrator.</p>

      @if (errorMessage()) {
      <div class="alert-error fade-in">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage() }}
      </div>
      }

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <div class="input-wrapper">
          <i class="bi bi-envelope input-icon"></i>
          <input id="loginEmail" type="email" class="form-input" placeholder="nama@mutexa.com"
            [(ngModel)]="email" (keyup.enter)="onLogin()" autocomplete="email">
        </div>
      </div>

      <div class="form-group mt-3">
        <label for="loginPassword">Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input id="loginPassword" type="password" class="form-input" placeholder="••••••••"
            [(ngModel)]="password" (keyup.enter)="onLogin()" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-login" (click)="onLogin()" [disabled]="isLoading()">
        @if (isLoading()) {
        <span class="spinner-border spinner-border-sm me-2"></span>Memproses...
        } @else {
        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk ke Dashboard
        }
      </button>
    </div>

    <div class="login-footer">
      <span>Mutexa &copy; {{ currentYear }} — BCA Finance PDP</span>
    </div>
  </div>
</div>
